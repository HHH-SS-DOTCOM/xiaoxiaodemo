<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/html/favicon copy.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/登陆.css">
    <link rel="stylesheet" href="./iconfont/iconfont.css">
    <link rel="stylesheet" href="./css/base.css">
    <title>Document</title>
</head>
<body>
    <!--头部-->
    <div class="box1">
        <div class="headpart">
            <div class="logo"></div>
            <div class="enter"><a href="">进入首页</a><i class="iconfont icon-arrow-right-bold"></i></div>
        </div>
    </div>
    <!--body部分-->
    <div class="box1">
        <div class="bodypart">
            <form action="">
              <div class="login">
                <div class="login-nav">
                  <a href="" class="active" data-id="0">账户登陆</a>
                  <a href="" data-id="1">二维码登陆</a>
                </div>
                <div class="login-body" >
                    <input type="text" name="" id="" placeholder="请输入用户名/手机号" class="username">
                    <input type="password" name="" id="" placeholder="请输入用户密码">
                    <div class="box2"><input type="checkbox" class="read"><span>我已仔细阅读并同意<a href="">《用户使用须知》</a></span></div>
                    <button type="submit">下一步</button>
                    <div class="help">
                        <a href="" class="forget">忘记密码</a>
                        <a href="" class="sign">还没有账户？去注册</a>
                    </div>
                </div>
                <div class="login-body" style="display: none;">
                    <div class="login-img">
                        <img src="/素材/03-现代网页布局/素材/小兔鲜PC首页设计稿/assets/APP二维码.png" alt="">
                    </div>
                    <p>请使用移动端app扫描二维码登陆</p>
                </div>
              </div>
            </form>
        </div>
    </div>

    <script>
        const loginNav=document.querySelector('.login-nav')
        const loginBody=document.querySelectorAll('.login-body')
        const form=document.querySelector('form')
        const read=document.querySelector('.read')
        const username=document.querySelector('.username')
        const enter=document.querySelector('.enter')
        loginNav.addEventListener('click',function(e){
            e.preventDefault()
            if(e.target.tagName==='A'){
                loginNav.querySelector('.active').classList.remove('active')
                e.target.classList.add('active')
            }
            if(e.target.tagName==='A'){
            for(let i=0;i<loginBody.length;i++){
                loginBody[i].style.display='none'
            }
            loginBody[`${e.target.dataset.id}`].style.display='block'
        }})
        form.addEventListener('submit',function(e){
            e.preventDefault()
            if(!read.checked){
                return alert('请先勾选用户条款')
            }
            localStorage.setItem('username',username.value)
            location.href='./小兔鲜首页.html'
        })
        enter.addEventListener('click',function(e){
            e.preventDefault()
            location.href='./小兔鲜首页.html'
        })
    </script>
</body>
</html>
